name: Build
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - run: npm --prefix webapp ci
    - run: npm --prefix gateway ci
    - run: npm --prefix stats install
    - run: npm --prefix auth_service ci
    - run: npm --prefix webapp run test:coverage
    - run: npm --prefix gateway run test:coverage
    - run: npm --prefix stats run test:coverage
    - run: npm --prefix auth_service run test:coverage
    - run: npm --prefix webapp run test:e2e:run -- --dry-run
    - run: npm --prefix gateway run test:e2e -- --dry-run

    - name: Install Playwright browsers
      run: |
        cd webapp
        npx playwright install --with-deps

    # -------------------------------
    # 3) Ejecutar E2E reales
    # -------------------------------
    - name: Run E2E tests (webapp)
      run: npm --prefix webapp run test:e2e

    - name: Run E2E tests (gateway)
      run: npx --prefix webapp start-server-and-test "npm --prefix webapp run start:all:e2e" http://localhost:8080 "npm --prefix gateway run test:e2e"
    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov --locked
    - name: Generate gamey code coverage
      run: cd gamey && cargo llvm-cov --lcov --output-path lcov.info
    - name: Normalize Rust coverage paths
      run: |
        sed -i "s|SF:${GITHUB_WORKSPACE}/|SF:|g" gamey/lcov.info
        grep '^SF:' gamey/lcov.info | head
    - name: Analyze with SonarQube
      uses: SonarSource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
