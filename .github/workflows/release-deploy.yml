name: Release — Test, Build, Publish, Deploy

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.event.release.tag_name }}

jobs:
  test-node:
    name: Run node unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [webapp, gateway, stats, auth_service]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          npm ci

      - name: Run tests
        run: |
          cd ${{ matrix.service }}
          npm test

  test-rust:
    name: Run rust (gamey) tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: |
          cd gamey
          cargo test

  e2e:
    name: Run E2E tests (webapp + gateway)
    runs-on: ubuntu-latest
    needs: [test-node, test-rust]
    services:
      mongo-auth:
        image: mongo:6.0
        ports:
          - 27018:27017
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install auth_service dependencies
        run: |
          cd auth_service
          npm ci
      - name: Install webapp dependencies
        run: |
          cd webapp
          npm ci
      - name: Install gateway dependencies
        run: |
          cd gateway
          npm ci
      - name: Install Playwright browsers
        run: |
          cd webapp
          npx playwright install --with-deps
      - name: Run E2E tests (start servers and run cucumber)
        env:
          JWT_SECRET: e2e-test-secret
          MONGO_AUTH_DB: mongodb://localhost:27018/auth
        run: |
          cd webapp
          npm run test:e2e
      - name: Start docker-compose stack for gateway E2E
        env:
          JWT_SECRET: e2e-test-secret
          JWT_EXPIRES: 1h
        run: |
          docker compose up -d --build
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/health >/dev/null; then
              echo "Gateway is healthy"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Gateway did not become healthy in time"
              docker compose ps
              docker compose logs --tail=200
              exit 1
            fi
            sleep 5
          done
      - name: Run gateway cucumber E2E
        run: |
          cd gateway
          npm run test:e2e
      - name: Stop docker-compose stack
        if: always()
        run: docker compose down -v

  docker-push-webapp:
    name: Publish webapp image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (webapp)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-webapp
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          tags: latest,${{ env.IMAGE_TAG }}
          workdir: webapp

  docker-push-gateway:
    name: Publish gateway image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (gateway)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-gateway
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          tags: latest,${{ env.IMAGE_TAG }}
          workdir: gateway

  docker-push-gamey:
    name: Publish gamey image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (gamey)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-gamey
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          tags: latest,${{ env.IMAGE_TAG }}
          workdir: gamey

  docker-push-auth:
    name: Publish auth image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (auth)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-auth
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          tags: latest,${{ env.IMAGE_TAG }}
          workdir: auth_service

  docker-push-stats:
    name: Publish stats image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (stats)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-stats
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          tags: latest,${{ env.IMAGE_TAG }}
          workdir: stats

  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    needs: [docker-push-webapp, docker-push-gateway, docker-push-gamey, docker-push-auth, docker-push-stats]
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          fingerprint: ${{ secrets.DEPLOY_FINGERPRINT }}
          timeout: 60s
          command_timeout: 20m
          request_pty: true
          script: |
            set -Eeuo pipefail
            trap 'rc=$?; echo "Deploy failed with exit code ${rc} on line ${LINENO}"; exit ${rc}' ERR
            COMPOSE_BIN="docker compose"
            if ! docker compose version >/dev/null 2>&1; then
              COMPOSE_BIN="docker-compose"
            fi

            ASSETS_BASE="https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ env.IMAGE_TAG }}"
            wget -q "${ASSETS_BASE}/docker-compose.yml" -O docker-compose.yml

            mkdir -p monitoring/prometheus
            if [ -d monitoring/prometheus/prometheus.yml ]; then
              rm -rf monitoring/prometheus/prometheus.yml
            fi
            wget -q "${ASSETS_BASE}/monitoring/prometheus/prometheus.yml" -O monitoring/prometheus/prometheus.yml

            mkdir -p monitoring/grafana/provisioning/datasources monitoring/grafana/provisioning/dashboards monitoring/grafana/dashboards
            wget -q "${ASSETS_BASE}/monitoring/grafana/provisioning/datasources/prometheus.yml" -O monitoring/grafana/provisioning/datasources/prometheus.yml
            wget -q "${ASSETS_BASE}/monitoring/grafana/provisioning/dashboards/dashboards.yml" -O monitoring/grafana/provisioning/dashboards/dashboards.yml
            wget -q "${ASSETS_BASE}/monitoring/grafana/dashboards/yovi-observability.json" -O monitoring/grafana/dashboards/yovi-observability.json

            mkdir -p gateway/certs
            if [ ! -s gateway/certs/server.crt ] || [ ! -s gateway/certs/server.key ]; then
              echo "Missing TLS certificates under gateway/certs. Expected server.crt and server.key"
              exit 1
            fi
            cat > .env << 'EOF'
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES=${{ secrets.JWT_EXPIRES }}
            MONGO_AUTH_DB=${{ secrets.MONGO_AUTH_DB }}
            GATEWAY_HTTP_HOST_PORT=80
            GATEWAY_HTTPS_HOST_PORT=443
            GATEWAY_PUBLIC_HOSTNAME=${{ secrets.DEPLOY_HOST }}
            HTTP_REDIRECT_ENABLED=true
            HTTPS_CERT_PATH=/app/certs/server.crt
            HTTPS_KEY_PATH=/app/certs/server.key
            EOF
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            for i in 1 2 3; do
              if $COMPOSE_BIN pull; then
                break
              fi
              if [ "$i" -eq 3 ]; then
                echo "docker compose pull failed after 3 attempts"
                $COMPOSE_BIN ps || true
                $COMPOSE_BIN logs --tail=200 || true
                exit 1
              fi
              sleep 5
            done

            $COMPOSE_BIN down --remove-orphans || true
            if ! $COMPOSE_BIN up -d --no-build; then
              $COMPOSE_BIN ps || true
              $COMPOSE_BIN logs --tail=200 || true
              exit 1
            fi

            if ! curl -kfsS https://localhost/health >/dev/null; then
              echo "HTTPS health check failed"
              $COMPOSE_BIN ps || true
              $COMPOSE_BIN logs --tail=200 || true
              exit 1
            fi

            if ! curl -fsSI http://localhost/health | grep -qi '^location: https://'; then
              echo "HTTP to HTTPS redirect check failed"
              $COMPOSE_BIN ps || true
              $COMPOSE_BIN logs --tail=200 || true
              exit 1
            fi

            $COMPOSE_BIN ps
            echo "REMOTE_DEPLOY_OK"
            exit 0
