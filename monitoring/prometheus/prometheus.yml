global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: gateway
    static_configs:
      - targets:
          - gateway:8080

  - job_name: auth
    static_configs:
      - targets:
          - auth:3500

  - job_name: stats
    static_configs:
      - targets:
          - stats:3001

  - job_name: gamey
    static_configs:
      - targets:
          - gamey:4000
