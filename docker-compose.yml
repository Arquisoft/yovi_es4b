services:
  mongo-auth:
    image: mongo:6.0
    container_name: mongo-auth
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-auth-data:/data/db
    networks:
      - monitor-net

  mongo-stats:
    image: mongo:6.0
    container_name: mongo-stats
    restart: unless-stopped
    ports:
      - "28018:27017"
    volumes:
      - mongo-stats-data:/data/db
    networks:
      - monitor-net

  stats:
    container_name: stats
    image: ghcr.io/arquisoft/yovi_es4b-stats:${IMAGE_TAG:-latest}
    build:
      context: ./stats
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - MONGO_URL=mongodb://mongo-stats:27017
      - MONGO_DB_NAME=yovi_stats
      - STATS_INTERNAL_TOKEN=stats-internal-token
    depends_on:
      - mongo-stats
    networks:
      - monitor-net

  gateway:
    container_name: gateway
    image: ghcr.io/arquisoft/yovi_es4b-gateway:${IMAGE_TAG:-latest}
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_HTTPS_HOST_PORT:-443}:${HTTPS_PORT:-8443}"
      - "${GATEWAY_HTTP_HOST_PORT:-8080}:${PORT:-8080}"
    environment:
      - PORT=${PORT:-8080}
      - HTTPS_PORT=${HTTPS_PORT:-8443}
      - HTTP_REDIRECT_ENABLED=${HTTP_REDIRECT_ENABLED:-false}
      - HTTPS_CERT_PATH=${HTTPS_CERT_PATH:-/app/certs/server.crt}
      - HTTPS_KEY_PATH=${HTTPS_KEY_PATH:-/app/certs/server.key}
      - WEBAPP_SERVICE_URL=http://webapp:80
      - GAMEY_SERVICE_URL=http://gamey:4000
      - AUTH_SERVICE_URL=http://auth:3500
      - STATS_SERVICE_URL=http://stats:3001
    volumes:
      - ./gateway/certs:/app/certs:ro
    depends_on:
      - webapp
      - gamey
      - stats
      - auth
    networks:
      - monitor-net

  webapp:
    container_name: webapp
    image: ghcr.io/arquisoft/yovi_es4b-webapp:${IMAGE_TAG:-latest}
    build:
      context: ./webapp
      dockerfile: Dockerfile
    networks:
      - monitor-net

  gamey:
    container_name: gamey
    image: ghcr.io/arquisoft/yovi_es4b-gamey:${IMAGE_TAG:-latest}
    build:
      context: ./gamey
      dockerfile: Dockerfile
    environment:
      - STATS_SERVICE_URL=http://stats:3001
      - STATS_INTERNAL_TOKEN=stats-internal-token
    networks:
      - monitor-net

  auth:
    container_name: auth
    image: ghcr.io/arquisoft/yovi_es4b-auth:${IMAGE_TAG:-latest}
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    environment:
      - MONGO_AUTH_DB=mongodb://mongo-auth:27017/auth
      - JWT_SECRET=${JWT_SECRET:-change_this_secret}
      - JWT_EXPIRES=${JWT_EXPIRES:-1h}
      - PORT=3500
    ports:
      - "3500:3500"
    depends_on:
      - mongo-auth
    networks:
      - monitor-net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - monitor-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "9091:3000"
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge

volumes:
  mongo-auth-data:
  mongo-stats-data:
