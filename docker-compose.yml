services:
  mongo-auth:
    image: mongo:6.0
    container_name: mongo-auth
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-auth-data:/data/db
    networks:
      - monitor-net

  mongo-stats:
    image: mongo:6.0
    container_name: mongo-stats
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-stats-data:/data/db
    networks:
      - monitor-net

  stats:
    build: ./stats
    container_name: stats
    image: ghcr.io/arquisoft/yovi_es4b-stats:latest
    ports:
      - "3001:3001"
    environment:
      - MONGO_URL=mongodb://mongo-stats:27017
      - MONGO_DB_NAME=yovi_stats
      - STATS_INTERNAL_TOKEN=stats-internal-token
    depends_on:
      - mongo-stats
    networks:
      - monitor-net

  gateway:
    build: ./gateway
    container_name: gateway
    image: ghcr.io/arquisoft/yovi_es4b-gateway:latest
    ports:
      - "80:8080"
    depends_on:
      - webapp
      - users
      - gamey
      - stats
      - auth
    networks:
      - monitor-net

  users:
    build: ./users
    container_name: users
    image: ghcr.io/arquisoft/yovi_es4b-users:latest
    networks:
      - monitor-net

  webapp:
    build: ./webapp
    container_name: webapp
    image: ghcr.io/arquisoft/yovi_es4b-webapp:latest
    networks:
      - monitor-net

  gamey:
    build: ./gamey
    container_name: gamey
    image: ghcr.io/arquisoft/yovi_es4b-gamey:latest
    environment:
      - STATS_SERVICE_URL=http://stats:3001
      - STATS_INTERNAL_TOKEN=stats-internal-token
    networks:
      - monitor-net

  auth:
    build: ./auth_service
    container_name: auth
    image: ghcr.io/arquisoft/yovi_es4b-auth:latest
    environment:
      - MONGO_AUTH_DB=mongodb://mongo-auth:27017/auth
      - JWT_SECRET=${JWT_SECRET:-change_this_secret}
      - JWT_EXPIRES=${JWT_EXPIRES:-1h}
      - PORT=3500
    ports:
      - "3500:3500"
    depends_on:
      - mongo-auth
    networks:
      - monitor-net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./users/monitoring/prometheus:/etc/prometheus
    networks:
      - monitor-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "9091:3000"
    volumes:
      - ./users/monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge

volumes:
  mongo-auth-data:
  mongo-stats-data:
