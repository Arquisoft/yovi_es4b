services:
  gateway:
    build: ./gateway
    container_name: gateway
    image: ghcr.io/arquisoft/yovi_es4b-gateway:latest
    ports:
      - "80:8080"
    depends_on:
      - webapp
      - users
      - gamey
      - auth
    networks:
      - monitor-net

  users:
    build: ./users
    container_name: users
    image: ghcr.io/arquisoft/yovi_es4b-users:latest
    networks:
      - monitor-net

  webapp:
    build: ./webapp
    container_name: webapp
    image: ghcr.io/arquisoft/yovi_es4b-webapp:latest
    networks:
      - monitor-net

  gamey:
    build: ./gamey
    container_name: gamey
    image: ghcr.io/arquisoft/yovi_es4b-gamey:latest
    networks:
      - monitor-net

  mongo:
    image: mongo:6.0
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - monitor-net

  auth:
    build: ./auth_service
    container_name: auth
    image: ghcr.io/arquisoft/yovi_es4b-auth:latest
    environment:
      - MONGO_AUTH_DB=${MONGO_AUTH_DB:-mongodb://mongo:27017/auth}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES=${JWT_EXPIRES:-1h}
      - PORT=3500
    ports:
      - "3500:3500"
    depends_on:
      - mongo
    networks:
      - monitor-net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./users/monitoring/prometheus:/etc/prometheus
    networks:
      - monitor-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "9091:3000"
    volumes:
      - ./users/monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge

volumes:
  mongo-data:
