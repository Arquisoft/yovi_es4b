services:
  mongo-auth:
    image: mongo:6.0
    container_name: mongo-auth
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-auth-data:/data/db
    networks:
      - monitor-net

  mongo-stats:
    image: mongo:6.0
    container_name: mongo-stats
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-stats-data:/data/db
    networks:
      - monitor-net

  stats:
    container_name: stats
    build:
      context: ./stats
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - MONGO_URL=mongodb://mongo-stats:27017
      - MONGO_DB_NAME=yovi_stats
      - STATS_INTERNAL_TOKEN=stats-internal-token
    depends_on:
      - mongo-stats
    networks:
      - monitor-net

  gateway:
    container_name: gateway
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "80:8080"
    environment:
      - WEBAPP_SERVICE_URL=http://webapp:80
      - GAMEY_SERVICE_URL=http://gamey:4000
      - AUTH_SERVICE_URL=http://auth:3500
      - STATS_SERVICE_URL=http://stats:3001
    depends_on:
      - webapp
      - gamey
      - stats
      - auth
    networks:
      - monitor-net

  users:
    container_name: users
    build:
      context: ./users
      dockerfile: Dockerfile
    networks:
      - monitor-net
  webapp:
    container_name: webapp
    build:
      context: ./webapp
      dockerfile: Dockerfile
    networks:
      - monitor-net

  gamey:
    container_name: gamey
    build:
      context: ./gamey
      dockerfile: Dockerfile
    environment:
      - STATS_SERVICE_URL=http://stats:3001
      - STATS_INTERNAL_TOKEN=stats-internal-token
    networks:
      - monitor-net

  auth:
    container_name: auth
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    environment:
      - MONGO_AUTH_DB=mongodb://mongo-auth:27017/auth
      - JWT_SECRET=${JWT_SECRET:-change_this_secret}
      - JWT_EXPIRES=${JWT_EXPIRES:-1h}
      - PORT=3500
    ports:
      - "3500:3500"
    depends_on:
      - mongo-auth
    networks:
      - monitor-net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - monitor-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "9091:3000"
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge

volumes:
  mongo-auth-data:
  mongo-stats-data:
